version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: finsight_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build: 
      context: ./server
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "5001:5001"
    environment:
      DATABASE_URL: "postgresql://postgres:password@postgres:5432/finsight_db"
      REDIS_URL: "redis://redis:6379"
      JWT_SECRET: "finsight-wda2026-super-secret-key-change-in-production"
      JWT_EXPIRES_IN: "7d"
      PORT: 5001
      NODE_ENV: development
      CLIENT_URL: "http://localhost:5173"
      # ALPHA_VANTAGE_API_KEY: "your_key"
      # NEWS_API_KEY: "your_key"
    restart: always

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    depends_on:
      - server
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: "http://localhost:5001/api"
    restart: always

volumes:
  postgres_data:
  redis_data:
